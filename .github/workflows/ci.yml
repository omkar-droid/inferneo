name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]" --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Lint
        run: ruff check inferneo tests
      - name: Test (CPU only)
        run: pytest -m "not gpu and not slow"
